SecRuleEngine On
SecRequestBodyAccess On
SecResponseBodyAccess On

SecDefaultAction "phase:1,log,deny,status:403"
SecDefaultAction "phase:2,log,deny,status:403"

SecRule ARGS|ARGS_NAMES|REQUEST_BODY "@rx <script" "id:1001,phase:2,msg:'XSS Attack Detected'"
SecRule ARGS|ARGS_NAMES|REQUEST_BODY "@rx union.*select" "id:1002,phase:2,msg:'SQL Injection Detected'"
SecRule ARGS|ARGS_NAMES|REQUEST_BODY "@rx drop.*table" "id:1003,phase:2,msg:'SQL Injection Detected'"
SecRule ARGS|ARGS_NAMES|REQUEST_BODY "@rx delete.*from" "id:1004,phase:2,msg:'SQL Injection Detected'"
SecRule ARGS|ARGS_NAMES|REQUEST_BODY "@rx ../" "id:1005,phase:2,msg:'Path Traversal Detected'"
SecRule ARGS|ARGS_NAMES|REQUEST_BODY "@rx \\b(?:https?|ftp|file)://" "id:1006,phase:2,msg:'SSRF Attempt'"
SecRule ARGS|ARGS_NAMES|REQUEST_BODY "@rx (\\{\\$|\\$\\(|\\`|\\%\\{)" "id:1007,phase:2,msg:'Command Injection'"

SecRule REQUEST_URI "@rx /admin" "id:2001,phase:1,log,allow"

SecResponseBodyMimeType text/plain text/html text/xml
SecResponseBodyLimit 524288

SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(5|4(?!04))"
SecAuditLogParts ABIJDEFHZ
SecAuditLog /var/log/modsec_audit.log